name: release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false

      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: TouchForge-windows-x64.zip

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: TouchForge-windows-arm64.zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: TouchForge-linux-x64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null

          Copy-Item target/${{ matrix.target }}/release/touchforge-cli.exe dist/

          Compress-Archive `
            -Path dist/* `
            -DestinationPath ${{ matrix.archive }} `
            -Force

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/touchforge-cli dist/
          tar -czf ${{ matrix.archive }} dist

      - name: Determine Tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: ${{ matrix.archive }}
          overwrite_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
